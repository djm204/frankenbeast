name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Enable packageManager-pinned npm
        run: |
          corepack enable
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate

      - name: Verify npm matches packageManager
        run: node scripts/check-package-manager.mjs

      - run: npm ci

      - name: Validate release before creating tags
        run: |
          npm run test:root -- tests/workspaces.test.ts tests/unit/release-please-config.test.ts tests/unit/ci-workflow.test.ts
          npm run lint:security
          npx turbo run build typecheck test lint

  release-please:
    needs: validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Ensure only root release is marked latest
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Root releases use bare version tags (v1.2.3).
          # Component releases are prefixed (franken-brain-v0.3.0).
          # GitHub auto-marks the most recently created release as "latest",
          # which could be any sub-package. Fix that.
          latest_tag=$(gh release view --json tagName --jq '.tagName' 2>/dev/null || echo '')
          if [ -z "$latest_tag" ]; then exit 0; fi

          # If the current "latest" is already a root release, nothing to do
          if [[ "$latest_tag" =~ ^v[0-9] ]]; then
            echo "Latest is already root release: $latest_tag"
            exit 0
          fi

          # Demote the component release
          echo "Demoting component release: $latest_tag"
          gh release edit "$latest_tag" --latest=false

          # Promote the most recent root release back to latest
          root_tag=$(gh release list --json tagName --jq '[.[] | select(.tagName | test("^v[0-9]"))][0].tagName' 2>/dev/null || echo '')
          if [ -n "$root_tag" ]; then
            echo "Promoting root release: $root_tag"
            gh release edit "$root_tag" --latest
          fi

  publish-npm:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PATHS_RELEASED: ${{ needs.release-please.outputs.paths_released }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Enable packageManager-pinned npm
        run: |
          corepack enable
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate

      - name: Verify npm matches packageManager
        run: node scripts/check-package-manager.mjs

      - run: npm ci

      - name: Build publish artifacts after validation
        run: npx turbo run build

      - name: Publish released npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${PATHS_RELEASED:-}" ] || [ "${PATHS_RELEASED:-}" = "null" ]; then
            echo "No released package paths reported by release-please"
            exit 0
          fi

          echo "$PATHS_RELEASED" | jq -r '.[]' | while IFS= read -r package_path; do
            package_json="$package_path/package.json"
            if [ "$package_path" = "." ]; then
              package_json="package.json"
            fi

            if [ ! -f "$package_json" ]; then
              echo "Skipping $package_path: no package.json"
              continue
            fi

            is_private=$(node -e "const p=require('./${package_json}'); process.stdout.write(p.private === true ? 'true' : 'false')")
            if [ "$is_private" = "true" ]; then
              echo "Skipping $package_path: package is private"
              continue
            fi

            name=$(node -e "process.stdout.write(require('./${package_json}').name)")
            version=$(node -e "process.stdout.write(require('./${package_json}').version)")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "Skipping $name@$version: already published"
              continue
            fi

            if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
              echo "NPM_TOKEN secret is required to publish $name@$version" >&2
              exit 1
            fi

            echo "Publishing $name@$version from $package_path"
            npm publish "$package_path" --access public --provenance
          done
