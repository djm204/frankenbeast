name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-release:
    runs-on: ubuntu-latest
    # The full pre-release build, test, lint, and eval suite is bounded to the
    # same two-hour ceiling as the main CI validation job.
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm

      - name: Enable packageManager-pinned npm
        run: |
          corepack enable npm
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate

      - name: Verify npm matches packageManager
        run: node scripts/check-package-manager.mjs

      - run: npm ci

      - name: Validate release before creating tags
        run: |
          npm run test:root -- tests/workspaces.test.ts tests/unit/release-please-config.test.ts tests/unit/ci-workflow.test.ts tests/unit/web-dev-server-dependency-policy.test.ts
          npm run lint:security
          npx turbo run build typecheck lint
          npx turbo run test
          npm run ci:test:observer-eval

  release-please:
    needs: validate-release
    runs-on: ubuntu-latest
    # Release metadata creation is API-bound and should never occupy a runner
    # beyond this short operational window.
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Ensure only root release is marked latest
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Root releases use bare version tags (v1.2.3).
          # Component releases are prefixed (franken-brain-v0.3.0).
          # GitHub auto-marks the most recently created release as "latest",
          # which could be any sub-package. Fix that.
          # Bound the API response, then sort valid root tags ourselves rather
          # than relying on GitHub's creation-date ordering.
          release_json=$(gh release list --limit 1000 --exclude-drafts --exclude-pre-releases --json tagName,isLatest)
          latest_tag=$(jq -r '([.[] | select(.isLatest)][0].tagName // empty)' <<<"$release_json")
          if [ -z "$latest_tag" ]; then
            echo "No latest release found; nothing to repair"
            exit 0
          fi

          # If the current "latest" is already a root release, nothing to do
          if [[ "$latest_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Latest is already root release: $latest_tag"
            exit 0
          fi

          # Select the greatest stable semantic version deterministically.
          root_tag=$(jq -r '
            [
              .[]
              | .tagName
              | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))
              | { tag: ., version: (ltrimstr("v") | split(".") | map(tonumber)) }
            ]
            | sort_by(.version) | reverse
            | .[0].tag // empty
          ' <<<"$release_json")
          if [ -z "$root_tag" ]; then
            echo "No unambiguous root release found in bounded release list; refusing to change latest: $latest_tag" >&2
            exit 1
          fi

          # Demote the component release, then promote the root release.
          echo "Demoting component release: $latest_tag"
          gh release edit "$latest_tag" --latest=false

          echo "Promoting root release: $root_tag"
          gh release edit "$root_tag" --latest

          verified_tag=$(gh release view --json tagName --jq '.tagName')
          if [ "$verified_tag" != "$root_tag" ]; then
            echo "Latest release verification failed: expected $root_tag, got $verified_tag" >&2
            exit 1
          fi

  publish-npm:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    # Building and publishing all released workspaces may need cold-cache time,
    # but must terminate within 45 minutes if npm or GitHub stalls.
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    env:
      PATHS_RELEASED: ${{ needs.release-please.outputs.paths_released }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Enable packageManager-pinned npm
        run: |
          corepack enable npm
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate

      - name: Verify npm matches packageManager
        run: node scripts/check-package-manager.mjs

      - run: npm ci

      - name: Build publish artifacts after validation
        run: npx turbo run build

      - name: Publish released npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${PATHS_RELEASED:-}" ] || [ "${PATHS_RELEASED:-}" = "null" ]; then
            echo "No released package paths reported by release-please"
            exit 0
          fi

          echo "$PATHS_RELEASED" | jq -r '.[]' | while IFS= read -r package_path; do
            package_json="$package_path/package.json"
            if [ "$package_path" = "." ]; then
              package_json="package.json"
            fi

            if [ ! -f "$package_json" ]; then
              echo "Skipping $package_path: no package.json"
              continue
            fi

            is_private=$(node -e "const p=require('./${package_json}'); process.stdout.write(p.private === true ? 'true' : 'false')")
            if [ "$is_private" = "true" ]; then
              echo "Skipping $package_path: package is private"
              continue
            fi

            name=$(node -e "process.stdout.write(require('./${package_json}').name)")
            version=$(node -e "process.stdout.write(require('./${package_json}').version)")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "Skipping $name@$version: already published"
              continue
            fi

            if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
              echo "NPM_TOKEN secret is required to publish $name@$version" >&2
              exit 1
            fi

            echo "Publishing $name@$version from $package_path"
            npm publish "$package_path" --access public --provenance
          done
