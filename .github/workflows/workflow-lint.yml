name: Workflow lint

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'

jobs:
  actionlint:
    runs-on: ubuntu-latest
    # A single actionlint pass should finish quickly; bound runner use if the
    # action download or lint process stalls.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Lint GitHub Actions workflows
        uses: raven-actions/actionlint@v2.2.0
        with:
          version: 1.7.12
