name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        deterministic-seed: ['1337']
    env:
      FRANKENBEAST_SEED: ${{ matrix.deterministic-seed }}
      CI_TEST_RETRIES: ${{ vars.CI_TEST_RETRIES || '2' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Enable packageManager-pinned npm
        run: |
          npm install -g corepack@0.34.4
          corepack enable npm
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate

      - name: Verify npm matches packageManager
        run: node scripts/check-package-manager.mjs

      - name: Validate bootstrap dry-run
        run: ./scripts/bootstrap.sh --dry-run

      - run: npm ci

      - name: Validate bootstrap script (dry-run)
        env:
          CI_BOOTSTRAP_DRY_RUN: "1"
        run: npm run bootstrap:dry-run

      - name: Dependency vulnerability audit
        run: npm run audit:dependencies

      - name: Dependency major-version freshness check
        run: npm run deps:outdated:major

      - name: Generate CycloneDX dependency SBOM
        run: npm sbom --sbom-format cyclonedx > "${RUNNER_TEMP}/sbom.cyclonedx.json"

      - name: Upload dependency SBOM
        uses: actions/upload-artifact@v4
        with:
          name: dependency-sbom-cyclonedx
          path: ${{ runner.temp }}/sbom.cyclonedx.json
          if-no-files-found: error
          retention-days: 30

      - run: npm run audit:security

      - name: Run Docker sandbox build smoke test
        run: npm run test:docker:sandbox

      - run: npm run lint:security

      - name: Track code comment debt markers
        run: npm run audit:todos

      - name: Workspace dependency hygiene (no wildcard internal deps)
        run: node scripts/check-workspace-deps.mjs

      - name: Dependabot supply-chain guard
        run: npm run check:dependabot-supply-chain

      - name: Run package build and typecheck
        run: npx turbo run build typecheck

      - name: Run workspace lint gate
        run: npm run lint

      - name: Run root and package CI test suite
        run: npm run test:ci

      # Orchestrator E2E tests are available via `npm run test:e2e` and
      # `npm run ci:test:e2e`, but several specs require external LLM provider
      # CLIs or mock environments that are not present in the default CI runner.
      # A subset of E2E specs (smoke, happy-path, chat, injection-midflow,
      # budget-exceeded, pii-scrubbing, self-correction, critique-retry) run
      # cleanly with in-memory ports; the remaining CLI-driven and chunk-
      # pipeline tests have pre-existing failures that need provider setup or
      # checkpoint-naming fixes before they can gate every PR.
      # See .github/workflows/orchestrator-e2e.yml for the manual/scheduled
      # E2E workflow and https://github.com/djm204/frankenbeast/issues/2083.
      - name: Orchestrator E2E — deliberately skipped in main gate
        run: echo "E2E suite omitted from main CI; run orchestrator-e2e workflow for full suite"

      - name: Phantom dependency check (every runtime import is declared)
        run: node scripts/check-phantom-deps.mjs

  publish-smoke:
    name: publish smoke (pack + offline install + run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Enable packageManager-pinned npm
        run: |
          npm install -g corepack@0.34.4
          corepack enable npm
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate

      - run: npm ci

      # Packs every publishable package, installs the CLI + its workspace deps
      # into a clean project OUTSIDE the monorepo (optional deps omitted), and
      # runs each published CLI's --help. Catches phantom/undeclared deps,
      # packages shipping no dist, and broken bins — the class of breakage the
      # in-repo test suite hides via workspace hoisting.
      - name: Publish smoke test
        run: node scripts/publish-smoke.mjs