version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-security-and-maintenance:
        patterns:
          - "*"
        exclude-patterns:
          - "@franken/*"
    ignore:
      - dependency-name: "@franken/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
